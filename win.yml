---
- hosts: all
  become: no
  tasks:
    - name: "create {{ win_user_name }} .ssh/ dicrectory"
      file:
        path: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.ssh"
        state: directory

    - name: "put {{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.ssh/config"
      template:
        src: win/.ssh/config
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.ssh/config"
        backup: true

    - name: "put {{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.ssh/config"
      template:
        src: win/.ssh/config
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.ssh/config"
        backup: true

    - name: "put win {{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.gitconfig"
      template:
        src: win/.gitconfig.j2
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.gitconfig"
        backup: true

    - name: "put win {{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.gitconfig"
      template:
        src: win/.gitignore_global
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.gitignore_global"
        backup: true

    - name: "create {{ win_user_name }} .claude/ directory"
      file:
        path: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.claude"
        state: directory

    - name: "put win .claude/CLAUDE.md"
      template:
        src: home/.claude/CLAUDE.md.j2
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.claude/CLAUDE.md"
        backup: true

    - name: "put win .claude/settings.json"
      template:
        src: home/.claude/settings.json.j2
        dest: "{{ wsl_mount_dir }}c/Users/{{ win_user_name }}/.claude/settings.json"
        backup: true